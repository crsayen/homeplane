services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      RPI_LGPIO_REVISION: "00d04171"
      CONFIG_STORE_BACKEND: ${CONFIG_STORE_BACKEND:-file}
      SQLITE_CONFIG_DB_PATH: /data/homeplane-config.sqlite3
      AUDIO_CONFIG_PATH: /data/multi-room-audio.config.json
      AUDIO_CONFIG_SEED_PATH: /app/data/multi-room-audio.config.json
      LIGHTING_CONFIG_PATH: /data/lighting.config.json
      LIGHTING_CONFIG_SEED_PATH: /app/data/lighting.config.json
      KIOSK_CONFIG_PATH: /data/kiosk.config.json
      KIOSK_CONFIG_SEED_PATH: /app/data/kiosk.config.json
    volumes:
      - homeplane_config:/data
    devices:
      - /dev/gpiochip0:/dev/gpiochip0
    restart: unless-stopped
    networks:
      - homeplane

  web:
    build:
      context: ./frontend
      args:
        VITE_HOMEPLANE_API_URL: ${VITE_HOMEPLANE_API_URL:-}
        VITE_HOMEPLANE_API_KEY: ${VITE_HOMEPLANE_API_KEY}
    depends_on:
      - backend
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - homeplane

  go2rtc:
    image: alexxit/go2rtc
    volumes:
      - ./go2rtc.yaml:/config/go2rtc.yaml:ro
    ports:
      - "1984:1984"
    restart: unless-stopped
    networks:
      - homeplane

  caddy:
    image: caddy:2.8-alpine
    depends_on:
      - web
      - go2rtc
    env_file:
      - ./docker-compose.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    networks:
      - homeplane

networks:
  homeplane:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  homeplane_config:
