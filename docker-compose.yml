services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      CONFIG_STORE_BACKEND: ${CONFIG_STORE_BACKEND:-file}
      SQLITE_CONFIG_DB_PATH: /data/homeplane-config.sqlite3
      AUDIO_CONFIG_PATH: /data/multi-room-audio.config.json
      AUDIO_CONFIG_SEED_PATH: /app/data/multi-room-audio.config.json
      LIGHTING_CONFIG_PATH: /data/lighting.config.json
      LIGHTING_CONFIG_SEED_PATH: /app/data/lighting.config.json
    volumes:
      - homeplane_config:/data
    restart: unless-stopped
    networks:
      - homeplane

  web:
    build:
      context: ./frontend
      args:
        VITE_HOMEPLANE_API_URL: ${VITE_HOMEPLANE_API_URL:-}
        VITE_HOMEPLANE_API_KEY: ${VITE_HOMEPLANE_API_KEY}
    depends_on:
      - backend
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - homeplane

  caddy:
    image: caddy:2.8-alpine
    depends_on:
      - web
    env_file:
      - ./docker-compose.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    networks:
      - homeplane

networks:
  homeplane:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  homeplane_config:
